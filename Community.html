<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>E-Libro Community</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
background:#f6efe8;
}

/* SIDEBAR */
.sidebar{
width:90px;
height:100vh;
background:white;
position:fixed;
left:0;
top:0;
display:flex;
flex-direction:column;
align-items:center;
padding-top:30px;
box-shadow:4px 0 20px rgba(0,0,0,0.06);
}

.logo{
margin-bottom:50px;
}

.menu{
display:flex;
flex-direction:column;
gap:30px;
}

.menu a{
width:64px;
height:64px;
display:flex;
align-items:center;
justify-content:center;
background:#f3e9df;
border-radius:18px;
text-decoration:none;
}

.material-icons{
font-size:30px;
color:#5D3023;
}

/* MAIN */
.main-content{
margin-left:120px;
width:calc(100% - 120px);
}

/* HEADER */
.header{
padding:30px 50px;
}

.header h1{
font-size:32px;
margin-bottom:10px;
}

.header p{
color:#777;
}

/* POST BOX */
.post-box{
margin:20px 50px;
background:white;
padding:15px;
border-radius:14px;
}

.post-box textarea{
width:100%;
border:none;
outline:none;
resize:none;
}

/* STAR INPUT */
.star-input{
margin-top:10px;
}

.star{
font-size:24px;
cursor:pointer;
color:#ccc;
}

.star.active{
color:#f5a623;
}

/* BUTTON */
.post-actions{
margin-top:10px;
display:flex;
justify-content:space-between;
}

.post-actions button{
background:#b77b4b;
color:white;
border:none;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
}

/* FEED */
.feed{
padding:0 50px 50px;
max-width:800px;
}

/* CARD */
.post{
background:white;
padding:18px;
border-radius:16px;
margin-bottom:18px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
display:flex;
justify-content:space-between;
gap:15px;
}

.post-content{
flex:1;
}

/* PROFILE */
.profile{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#ddd;
}

/* IMAGE KECIL */
.post img{
width:80px;
height:110px;
object-fit:cover;
border-radius:10px;
}

/* STARS DISPLAY */
.stars{
color:#f5a623;
margin:5px 0;
}

/* ACTION */
.actions{
display:flex;
gap:15px;
margin-top:10px;
color:#777;
cursor:pointer;
font-size:14px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">
<img src="Logo E-Libro.png" width="150">
</div>

<div class="menu">
<a href="#"><span class="material-icons">home</span></a>
<a href="#"><span class="material-icons">groups</span></a>
<a href="#"><span class="material-icons">menu_book</span></a>
<a href="#"><span class="material-icons">favorite</span></a>
<a href="#"><span class="material-icons">person</span></a>
</div>
</div>

<!-- MAIN -->
<div class="main-content">

<div class="header">
<h1>Community</h1>
<p>Berbagi ulasan buku favoritmu</p>
</div>

<!-- POST BOX -->
<div class="post-box">
<textarea id="text" placeholder="Tulis review buku..."></textarea>

<div class="star-input" id="starInput"></div>

<div class="post-actions">
<input type="file" id="image">
<button onclick="addPost()">Post</button>
</div>
</div>

<!-- FEED -->
<div class="feed" id="feed"></div>

</div>

<script>

let rating = 0;
let posts = JSON.parse(localStorage.getItem("community")) || [];

/* CREATE STAR INPUT */
const starContainer = document.getElementById("starInput");

for(let i=1;i<=5;i++){
let star = document.createElement("span");
star.innerHTML = "★";
star.className = "star";
star.onclick = ()=>setRating(i);
starContainer.appendChild(star);
}

function setRating(val){
rating = val;
let stars = document.querySelectorAll(".star");

stars.forEach((s,i)=>{
s.classList.toggle("active", i < val);
});
}

/* SAVE */
function save(){
localStorage.setItem("community", JSON.stringify(posts));
}

/* ADD POST */
function addPost(){
let text = document.getElementById("text").value;
let file = document.getElementById("image").files[0];

if(!text) return;

let reader = new FileReader();

reader.onload = function(e){
posts.unshift({
id:Date.now(),
text,
image:e.target.result,
rating
});
save();
render();
};

if(file){
reader.readAsDataURL(file);
}else{
reader.onload({target:{result:""}});
}
}

/* RENDER */
function render(){
let feed = document.getElementById("feed");
feed.innerHTML="";

posts.forEach(post=>{

let stars = "★".repeat(post.rating) + "☆".repeat(5-post.rating);

let div = document.createElement("div");
div.className="post";

div.innerHTML=`

<div class="post-content">

<div class="profile">
<div class="avatar"></div>
<strong>User</strong>
</div>

<div class="stars">${stars}</div>

<p>${post.text}</p>

<div class="actions">
<span class="material-icons">thumb_up</span> Like
<span class="material-icons">chat_bubble_outline</span> Komentar
</div>

</div>

${post.image ? `<img src="${post.image}">` : ""}

`;

feed.appendChild(div);

});
}

render();

</script>

</body>
</html>
