<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>E-Libro - Self Improvement</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
:root{
--bg:#F6EFE8;
--primary:#5D3023;
--accent:#B77B4B;
--hover:#6B3E26;
--soft:#F3E9DF;
--white:#FFFFFF;
--text-light:#8A8A8A;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:var(--bg);
}

/* HEADER */
.header{
padding:20px;
}

.title{
font-size:20px;
font-weight:600;
color:var(--primary);
}

.subtitle{
font-size:13px;
color:var(--text-light);
}

/* SEARCH */
.search-box{
padding:0 20px;
margin-bottom:10px;
}

.search-box input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:var(--white);
box-shadow:0 4px 10px rgba(0,0,0,0.05);
outline:none;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
padding:20px;
}

/* CARD */
.card{
background:var(--white);
border-radius:20px;
padding:12px;
box-shadow:0 8px 20px rgba(93,48,35,0.08);
position:relative;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

/* BADGE */
.badge{
position:absolute;
top:10px;
left:10px;
background:#D1FAE5;
color:#059669;
padding:3px 8px;
font-size:10px;
border-radius:10px;
}

/* HEART */
.heart input{display:none;}
.heart label{
position:absolute;
top:10px;
right:10px;
font-size:16px;
cursor:pointer;
color:#C4B5A5;
}
.heart input:checked + label{
color:#E11D48;
}

/* COVER */
.cover{
width:100%;
height:480px;
object-fit:cover;
border-radius:12px;
}

/* INFO */
.author{
font-size:11px;
color:var(--text-light);
margin-top:8px;
}

.title-book{
font-size:14px;
font-weight:600;
color:var(--primary);
}

.price{
margin-top:6px;
font-weight:bold;
color:var(--accent);
}

/* PREVIEW LINK */
.preview-link{
margin-top:6px;
font-size:11px;
color:var(--accent);
cursor:pointer;
text-decoration:underline;
}

/* RESPONSIVE */
@media(min-width:768px){
.grid{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>

<body>

<div class="header">
<div class="title">Self Improvement</div>
<div class="subtitle">1 Oktober 2024 - 31 Desember 2026</div>
</div>

<!-- SEARCH -->
<div class="search-box">
<input type="text" id="searchInput" placeholder="Cari buku atau penulis...">
</div>

<!-- GRID -->
<div class="grid" id="bookGrid">

<!-- CARD -->
<div class="card" data-title="Atomic Habits James Clear">
<div class="badge">EN</div>
<div class="heart">
<input type="checkbox" id="h1"><label for="h1">❤</label>
</div>
<img src="Atomic.jpeg" class="cover">
<div class="author">James Clear</div>
<div class="title-book">Atomic Habits</div>
<div class="price">Rp90.000</div>
<div class="preview-link" onclick="openPreview('https://example.com')">Preview</div>
</div>

<div class="card" data-title="Seporsi Mie Ayam Sebelum Mati Brian Khrisna">
<div class="badge">IN</div>
<div class="heart">
<input type="checkbox" id="h2"><label for="h2">❤</label>
</div>
<img src="Seporsi Mie Ayam.jpeg" class="cover">
<div class="author">Brian Khrisna</div>
<div class="title-book">Seporsi Mie Ayam Sebelum Mati</div>
<div class="price">Rp75.000</div>
<div class="preview-link" onclick="openPreview('https://example.com')">Preview</div>
</div>

<div class="card" data-title="The Psychology of Money Morgan Housel">
<div class="badge">EN</div>
<div class="heart">
<input type="checkbox" id="h3"><label for="h3">❤</label>
</div>
<img src="The Psychology of Money .jpeg" class="cover">
<div class="author">Morgan Housel</div>
<div class="title-book">The Psychology of Money</div>
<div class="price">Rp90.000</div>
<div class="preview-link" onclick="openPreview('https://example.com')">Preview</div>
</div>

<div class="card" data-title="The Alpha Girl's Guide Henry Manampiring">
<div class="badge">IN</div>
<div class="heart">
<input type="checkbox" id="h4"><label for="h4">❤</label>
</div>
<img src="The Alpha.jpeg" class="cover">
<div class="author">Henry Manampiring</div>
<div class="title-book">The Alpha Girl's Guide</div>
<div class="price">Rp75.000</div>
<div class="preview-link" onclick="openPreview('https://example.com')">Preview</div>
</div>

</div>

<script>

/* SEARCH FILTER */
document.getElementById("searchInput").addEventListener("keyup", function(){
let value = this.value.toLowerCase();
let cards = document.querySelectorAll(".card");

cards.forEach(card=>{
let text = card.getAttribute("data-title").toLowerCase();
card.style.display = text.includes(value) ? "block" : "none";
});
});

/* OPEN PREVIEW */
function openPreview(link){
window.open(link, "_blank");
}

</script>

</body>
</html>
